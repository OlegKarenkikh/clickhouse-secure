name: Build & CVE Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'

env:
  DOCKERHUB_IMAGE: olegkarenkikh/clickhouse-secure
  LOCAL_TAG: clickhouse-secure:scan

jobs:

  build-and-scan:
    name: Build -> Trivy Scan -> Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Plain docker build - guaranteed to load into local daemon for Trivy
      - name: Build Docker image (local)
        run: docker build -t "${{ env.LOCAL_TAG }}" .

      - name: Trivy - Table (PR log)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.LOCAL_TAG }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
        continue-on-error: true

      - name: Trivy - SARIF
        uses: aquasecurity/trivy-action@master
        if: always()
        continue-on-error: true
        with:
          image-ref: ${{ env.LOCAL_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy - JSON artifact
        uses: aquasecurity/trivy-action@master
        if: always()
        continue-on-error: true
        with:
          image-ref: ${{ env.LOCAL_TAG }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM,LOW
          trivyignores: .trivyignore

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('trivy-results.json') != ''
        with:
          name: trivy-report-${{ github.sha }}
          path: trivy-results.json
          retention-days: 30

      - name: Trivy - Gate (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.LOCAL_TAG }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'

  push-to-dockerhub:
    name: Push -> Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/main' || github.event_name == 'schedule')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          DATE="$(date -u +%Y-%m-%d)"
          TAGS="${{ env.DOCKERHUB_IMAGE }}:latest"
          TAGS="${TAGS},${{ env.DOCKERHUB_IMAGE }}:${SHORT_SHA}"
          TAGS="${TAGS},${{ env.DOCKERHUB_IMAGE }}:${DATE}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=clickhouse-secure
            org.opencontainers.image.source=https://github.com/OlegKarenkikh/clickhouse-secure
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tags.outputs.short_sha }}

      - name: Print digest
        run: |
          echo "Image : ${{ env.DOCKERHUB_IMAGE }}"
          echo "Tags  : ${{ steps.tags.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
